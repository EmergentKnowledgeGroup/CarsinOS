<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CarsinOS social preview</title>
  <desc id="desc">CarsinOS, mission control for local AI. Run assistants, approvals, schedules, memory, channels, and tools from one auditable control plane.</desc>
  <defs>
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07101e" stop-opacity=".12"/>
      <stop offset=".58" stop-color="#07101e" stop-opacity=".38"/>
      <stop offset="1" stop-color="#07101e" stop-opacity=".08"/>
    </linearGradient>
  </defs>
  <image href="carsinos-social-background.png" xlink:href="carsinos-social-background.png" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="url(#shade)"/>
  <rect x="1" y="1" width="1198" height="628" rx="22" fill="none" stroke="#344258" stroke-opacity=".8"/>

  <g transform="translate(72 66)">
    <g transform="translate(42 42)">
      <circle r="34" fill="none" stroke="#ffc43d" stroke-width="13" stroke-dasharray="140 74" transform="rotate(-74)"/>
      <circle r="34" fill="none" stroke="#2bc0d3" stroke-width="13" stroke-dasharray="140 74" transform="rotate(106)"/>
      <circle cx="14" cy="-14" r="6" fill="#ffc43d"/>
      <circle cx="-14" cy="14" r="6" fill="#2bc0d3"/>
    </g>
    <text x="96" y="36" fill="#f7f8fb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="850" letter-spacing="4">CARSINOS</text>
    <text x="96" y="65" fill="#9ba7ba" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="650" letter-spacing="2">MISSION CONTROL FOR LOCAL AI</text>
  </g>

  <g transform="translate(72 230)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="0" y="0" fill="#ffffff" font-size="56" font-weight="820" letter-spacing="-1.5">Run AI like an operation.</text>
    <text x="0" y="56" fill="#bac3d2" font-size="23">Assistants, approvals, schedules, memory, channels,</text>
    <text x="0" y="90" fill="#bac3d2" font-size="23">and tools in one local, auditable control plane.</text>
  </g>

  <g transform="translate(72 414)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="750" letter-spacing="1">
    <rect width="181" height="43" rx="21.5" fill="#ff6b1a" fill-opacity=".12" stroke="#ff6b1a" stroke-opacity=".78"/>
    <circle cx="22" cy="21.5" r="5" fill="#ff6b1a"/><text x="38" y="27" fill="#ffd2ba">WINDOWS BETA</text>
    <g transform="translate(197)">
      <rect width="160" height="43" rx="21.5" fill="#2bc0d3" fill-opacity=".1" stroke="#2bc0d3" stroke-opacity=".68"/>
      <circle cx="22" cy="21.5" r="5" fill="#2bc0d3"/><text x="38" y="27" fill="#b8f3f8">LOCAL-FIRST</text>
    </g>
    <g transform="translate(373)">
      <rect width="148" height="43" rx="21.5" fill="#22c55e" fill-opacity=".09" stroke="#22c55e" stroke-opacity=".66"/>
      <circle cx="22" cy="21.5" r="5" fill="#22c55e"/><text x="38" y="27" fill="#baf4ca">AUDITABLE</text>
    </g>
  </g>

  <text x="72" y="559" fill="#ffb17f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="750">github.com/EmergentKnowledgeGroup/CarsinOS</text>
</svg>
