name: Bug report
description: Report a reproducible CarsinOS problem without sharing sensitive data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve CarsinOS. Do not include tokens, credentials, personal data, private messages, runtime databases, or exploit details. Use private vulnerability reporting for security issues.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and did not find this problem.
          required: true
        - label: This is not a security vulnerability or sensitive-data report.
          required: true
        - label: I removed secrets, personal data, and private paths from this report.
          required: true
  - type: dropdown
    id: install
    attributes:
      label: How are you running CarsinOS?
      options:
        - Windows v0.1.0-beta MSI
        - Windows source checkout
        - macOS source checkout
        - Linux source checkout
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0-beta or a commit SHA
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the actual behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: List the smallest reliable sequence that reproduces the issue.
      placeholder: |
        1. Open …
        2. Choose …
        3. Observe …
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized logs or screenshots
      description: Optional. Remove tokens, private messages, usernames, local paths, and third-party identifiers.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS version, installation method, provider/channel involved, and any relevant local configuration.
    validations:
      required: true
